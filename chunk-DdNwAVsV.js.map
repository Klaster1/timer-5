<h1 mat-dialog-title>Edit session</h1>
<form mat-dialog-content id="promptForm" [formRoot]="form" (submit)="onSubmit()">
  <mat-form-field>
    <mat-label>Start</mat-label>
    <input matInput type="datetime-local" [formField]="form.start" data-e2e="dialog-edit-session__input-start" />
    <button-reset-input-control
      matSuffix
      [value]="form.start().value()"
      (reset)="form.start().value.set(null)"
    ></button-reset-input-control>
    <mat-error data-e2e="dialog-edit-session__start-validation-error">Start is required</mat-error>
  </mat-form-field>
  <mat-form-field>
    <mat-label>End</mat-label>
    <input matInput type="datetime-local" [formField]="form.end" data-e2e="dialog-edit-session__input-end" />
    <button-reset-input-control
      matSuffix
      [value]="form.end().value()"
      (reset)="form.end().value.set(null)"
    ></button-reset-input-control>
  </mat-form-field>
</form>
<div mat-dialog-actions align="end">
  <button type="button" mat-button mat-dialog-close>Cancel</button>
  <button type="submit" form="promptForm" mat-button data-e2e="dialog-edit-session__button-submit">Save</button>
</div>
