<ng-template #sessionTable let-sessions="sessions" [contextType]="sessionsContext">
  <table mat-table [dataSource]="sessions">
    <ng-container matColumnDef="start">
      <th mat-header-cell *matHeaderCellDef>Start</th>
      <td mat-cell *matCellDef="let session" data-e2e="dialog-split-session__session-start">
        {{ session.start | date: 'yyyy-MM-dd H:mm' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="end">
      <th mat-header-cell *matHeaderCellDef>End</th>
      <td mat-cell *matCellDef="let session" data-e2e="dialog-split-session__session-end">
        {{ session.end | date: 'yyyy-MM-dd H:mm' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="duration">
      <th mat-header-cell *matHeaderCellDef>Duration</th>
      <td mat-cell *matCellDef="let session" data-e2e="dialog-split-session__session-duration">
        <duration [value]="session | map: sessionDuration"></duration>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="splitPreviewColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: splitPreviewColumns" data-e2e="dialog-split-session__session-row"></tr>
  </table>
</ng-template>

<h1 mat-dialog-title>Split session</h1>
<form mat-dialog-content>
  <ng-container
    *ngTemplateOutlet="sessionTable; context: { sessions: beforeSessions() } as sessionsContext"
  ></ng-container>

  <mat-slider [min]="min()" [max]="max()">
    <input
      #thumb
      matSliderThumb
      [value]="value()"
      (input)="value.set(thumb.valueAsNumber)"
      data-e2e="dialog-split-session__slider-input"
    />
  </mat-slider>

  <ng-container
    *ngTemplateOutlet="sessionTable; context: { sessions: afterSessions() } as sessionsContext"
  ></ng-container>
</form>
<div mat-dialog-actions align="end">
  <button type="button" mat-button mat-dialog-close>Cancel</button>
  <button
    type="submit"
    form="promptForm"
    mat-button
    data-e2e="dialog-split-session__button-submit"
    [disabled]="submitDisabled()"
    (click)="submit()"
  >
    Split
  </button>
</div>
